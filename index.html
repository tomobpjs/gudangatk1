<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logistics Pro-Smart | Dark Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #e2e8f0; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .sidebar-item:hover { background: rgba(59, 130, 246, 0.1); color: #60a5fa; }
        .active-nav { background: rgba(59, 130, 246, 0.2); color: #60a5fa; border-right: 4px solid #3b82f6; }
        input, select { background: #1e293b !important; border: 1px solid #334155 !important; color: white !important; }
        .status-pill { padding: 2px 8px; border-radius: 9999px; font-size: 11px; font-weight: 600; }
        canvas { max-height: 300px; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex">

<aside class="w-64 glass border-r border-slate-800 flex flex-col fixed h-full z-50">
    <div class="p-6">
        <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-indigo-500 bg-clip-text text-transparent">LOGISTICS PRO</h1>
        <p class="text-[10px] text-slate-500 uppercase tracking-widest mt-1">Hospitality Management</p>
    </div>
    <nav class="flex-1 px-4 space-y-2 overflow-y-auto" id="main-nav">
        <button onclick="showSection('dashboard')" class="sidebar-item w-full flex items-center gap-3 p-3 rounded-xl transition-all duration-200 active-nav" id="nav-dashboard">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
            <span class="font-medium">Dashboard</span>
        </button>
        <button onclick="showSection('input')" class="sidebar-item w-full flex items-center gap-3 p-3 rounded-xl transition-all duration-200" id="nav-input">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
            <span class="font-medium">Input Logistic</span>
        </button>
        <button onclick="showSection('master')" class="sidebar-item w-full flex items-center gap-3 p-3 rounded-xl transition-all duration-200" id="nav-master">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8-4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4"></path></svg>
            <span class="font-medium">Master Data</span>
        </button>
    </nav>
    <div class="p-6 border-t border-slate-800">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center font-bold text-white shadow-lg shadow-blue-900/20" id="user-initial">A</div>
            <div>
                <p class="text-sm font-semibold" id="user-name">Loading...</p>
                <p class="text-[10px] text-slate-500" id="live-clock">00:00:00 WIB</p>
            </div>
        </div>
    </div>
</aside>

<main class="ml-64 flex-1 p-8 transition-all duration-300">
    <!-- Section Dashboard -->
    <section id="section-dashboard" class="space-y-6">
        <div class="flex justify-between items-end">
            <div>
                <h2 class="text-3xl font-bold">Ringkasan Logistik</h2>
                <p class="text-slate-400">Analitik penggunaan barang rumah sakit</p>
            </div>
            <div class="flex gap-4">
                <select id="dash-main-filter-year" class="p-2 rounded-lg text-sm outline-none"></select>
            </div>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div class="glass p-5 rounded-2xl border-l-4 border-blue-500">
                <p class="text-xs text-slate-400 font-semibold uppercase">Total Barang Terdata</p>
                <h3 class="text-2xl font-bold mt-1" id="stat-total-items">0</h3>
            </div>
            <div class="glass p-5 rounded-2xl border-l-4 border-indigo-500">
                <p class="text-xs text-slate-400 font-semibold uppercase">Kategori</p>
                <h3 class="text-2xl font-bold mt-1" id="stat-total-cats">0</h3>
            </div>
        </div>
    </section>

    <!-- Section Master Data -->
    <section id="section-master" class="hidden space-y-6">
        <div class="flex justify-between items-center">
            <h2 class="text-2xl font-bold">Master Data Barang</h2>
            <div class="flex gap-2">
                <input type="file" id="master-import-file" class="hidden" accept=".csv">
                <button onclick="document.getElementById('master-import-file').click()" class="bg-indigo-600 hover:bg-indigo-700 px-4 py-2 rounded-lg text-sm flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                    Import CSV
                </button>
            </div>
        </div>
        <div class="glass rounded-2xl overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-800/50 text-slate-400 text-xs uppercase tracking-wider">
                    <tr>
                        <th class="p-4">Kategori</th>
                        <th class="p-4">Nama Barang</th>
                        <th class="p-4 text-center">Aksi</th>
                    </tr>
                </thead>
                <tbody id="master-table-body" class="divide-y divide-slate-800"></tbody>
            </table>
        </div>
    </section>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, query, onSnapshot, addDoc, updateDoc, deleteDoc, writeBatch } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const firebaseConfig = {
  apiKey: "AIzaSyDEXHSwJq7l-B9UgmYzqgDqKCNUS0ho-j0",
  authDomain: "rekapbelanja.firebaseapp.com",
  projectId: "rekapbelanja",
  storageBucket: "rekapbelanja.firebasestorage.app",
  messagingSenderId: "867729593347",
  appId: "1:867729593347:web:1db201e3cc649490cdaa36"
};
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

    let user = null;
    let masterItems = [];

    const initAuth = async () => {
        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
            await signInWithCustomToken(auth, __initial_auth_token);
        } else {
            await signInAnonymously(auth);
        }
    };

    onAuthStateChanged(auth, (u) => {
        user = u;
        if (user) {
            document.getElementById('user-name').innerText = user.uid.substring(0, 8);
            document.getElementById('user-initial').innerText = user.uid.charAt(0).toUpperCase();
            loadMasterData();
        }
    });

    window.showSection = (section) => {
        document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
        document.getElementById(`section-${section}`).classList.remove('hidden');
        document.querySelectorAll('#main-nav button').forEach(b => b.classList.remove('active-nav'));
        document.getElementById(`nav-${section}`).classList.add('active-nav');
    };

    const loadMasterData = () => {
        if (!user) return;
        const q = collection(db, 'artifacts', appId, 'public', 'data', 'master_items');
        onSnapshot(q, (snapshot) => {
            masterItems = [];
            snapshot.forEach(doc => masterItems.push({ id: doc.id, ...doc.data() }));
            renderMasterTable();
            updateStats();
        }, (err) => console.error("Firestore Error:", err));
    };

    const renderMasterTable = () => {
        const tbody = document.getElementById('master-table-body');
        tbody.innerHTML = masterItems.map(item => `
            <tr class="hover:bg-slate-800/30 transition-colors">
                <td class="p-4"><span class="bg-slate-700 px-2 py-1 rounded text-xs">${item.category}</span></td>
                <td class="p-4 font-medium">${item.name}</td>
                <td class="p-4 text-center">
                    <button onclick="deleteMasterItem('${item.id}')" class="text-red-400 hover:text-red-300">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </button>
                </td>
            </tr>
        `).join('');
    };

    const updateStats = () => {
        document.getElementById('stat-total-items').innerText = masterItems.length;
        const cats = [...new Set(masterItems.map(i => i.category))];
        document.getElementById('stat-total-cats').innerText = cats.length;
    };

    window.deleteMasterItem = async (id) => {
        if (confirm('Hapus item ini?')) {
            await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'master_items', id));
        }
    };

    // --- BAGIAN YANG DIPERBAIKI (IMPORT LOGIC) ---
    document.getElementById('master-import-file').onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = async (evt) => {
            try {
                const text = evt.target.result;
                // Menggunakan Regex untuk membagi baris agar lebih akurat (\r\n atau \n)
                const lines = text.split(/\r?\n/).filter(line => line.trim() !== "");
                
                if (lines.length <= 1) {
                    alert("File CSV tidak memiliki data (hanya header atau kosong).");
                    return;
                }

                const batch = writeBatch(db);
                let count = 0;

                // Mulai dari i=1 untuk melewati header
                for (let i = 1; i < lines.length; i++) {
                    const row = lines[i].split(',');
                    if (row.length >= 2) {
                        // Bersihkan spasi dan tanda kutip yang sering muncul dari Excel
                        const category = row[0].replace(/['"]+/g, '').trim();
                        const name = row[1].replace(/['"]+/g, '').trim();
                        
                        if (category && name) {
                            const newDocRef = doc(collection(db, 'artifacts', appId, 'public', 'data', 'master_items'));
                            batch.set(newDocRef, { 
                                category, 
                                name,
                                createdAt: new Date().toISOString()
                            });
                            count++;
                        }
                    }
                }

                if (count > 0) {
                    await batch.commit();
                    alert(`Sukses! ${count} data barang berhasil ditambahkan.`);
                } else {
                    alert("Tidak ada data valid yang ditemukan. Periksa format kolom A dan B.");
                }
            } catch (error) {
                console.error("Gagal Import:", error);
                alert("Terjadi kesalahan sistem saat membaca file.");
            }
            e.target.value = ''; // Reset input file
        };
        reader.readAsText(file);
    };

    setInterval(() => { 
        document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('id-ID') + " WIB"; 
    }, 1000);

    initAuth();
</script>
</body>
</html>
