<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logistics Pro-Smart | Dark Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #e2e8f0; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); transition: all 0.3s ease; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4); }
        .nav-link.active { background: rgba(59, 130, 246, 0.1); color: #60a5fa; border-left: 4px solid #3b82f6; }
        input, select, textarea { background: #1e293b !important; border: 1px solid #334155 !important; color: white !important; border-radius: 0.5rem !important; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Auth Screen -->
    <div id="auth-screen" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-950 px-4">
        <div class="glass p-8 rounded-2xl w-full max-w-md shadow-2xl">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-500/20">
                    <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                </div>
                <h1 class="text-2xl font-bold text-white">Logistics Pro-Smart</h1>
                <p class="text-slate-400 text-sm mt-1" id="auth-subtitle">Masuk untuk mengelola logistik</p>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-medium text-slate-400 mb-1 uppercase tracking-wider">Email</label>
                    <input type="email" id="auth-email" class="w-full p-3 outline-none" placeholder="admin@hospital.id">
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-400 mb-1 uppercase tracking-wider">Password</label>
                    <input type="password" id="auth-pass" class="w-full p-3 outline-none" placeholder="••••••••">
                </div>
                <button id="btn-login" class="btn-primary w-full py-3 rounded-lg font-semibold text-white shadow-lg">Masuk Sekarang</button>
                
                <div class="relative py-4">
                    <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-700"></div></div>
                    <div class="relative flex justify-center text-xs uppercase"><span class="bg-slate-900 px-2 text-slate-500">Atau</span></div>
                </div>

                <button id="btn-toggle-auth" class="w-full py-2 text-sm text-blue-400 hover:text-blue-300 transition-colors">Belum punya akun? Daftar</button>
            </div>
            
            <div id="auth-error" class="hidden mt-4 p-3 bg-red-500/10 border border-red-500/20 text-red-400 text-xs rounded-lg text-center"></div>
        </div>
    </div>

    <!-- Main Content (Hidden by default) -->
    <div id="app-content" class="hidden flex-1 flex flex-col md:flex-row">
        <!-- Sidebar -->
        <aside class="w-full md:w-64 glass border-r border-slate-800 flex flex-col">
            <div class="p-6 border-b border-slate-800 flex items-center justify-between">
                <span class="font-bold text-blue-400 tracking-tight">LOGISTICS PRO</span>
                <button id="btn-logout" class="text-slate-500 hover:text-red-400"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg></button>
            </div>
            <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
                <button onclick="switchTab('dashboard')" class="nav-link w-full flex items-center space-x-3 p-3 rounded-lg text-sm active">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                    <span>Dashboard</span>
                </button>
                <button onclick="switchTab('input')" class="nav-link w-full flex items-center space-x-3 p-3 rounded-lg text-sm">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    <span>Input Barang</span>
                </button>
                <button onclick="switchTab('inventory')" class="nav-link w-full flex items-center space-x-3 p-3 rounded-lg text-sm">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
                    <span>Stok Inventaris</span>
                </button>
            </nav>
            <div class="p-4 bg-slate-900/50 text-center">
                <p id="live-clock" class="text-xs font-mono text-blue-400"></p>
                <p id="user-display" class="text-[10px] text-slate-500 mt-1 truncate"></p>
            </div>
        </aside>

        <!-- Main Workspace -->
        <main class="flex-1 overflow-y-auto bg-[#0f172a] p-4 md:p-8">
            <!-- Dashboard Tab -->
            <div id="tab-dashboard" class="tab-content space-y-6">
                <header class="flex justify-between items-end">
                    <div>
                        <h2 class="text-3xl font-bold">Ringkasan Logistik</h2>
                        <p class="text-slate-400">Statistik real-time pergerakan barang.</p>
                    </div>
                </header>
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="glass p-6 rounded-xl border-l-4 border-blue-500">
                        <p class="text-slate-400 text-sm">Total Transaksi</p>
                        <h3 id="stat-total-tx" class="text-3xl font-bold mt-1">0</h3>
                    </div>
                    <div class="glass p-6 rounded-xl border-l-4 border-emerald-500">
                        <p class="text-slate-400 text-sm">Barang Masuk (Bulan Ini)</p>
                        <h3 id="stat-total-in" class="text-3xl font-bold mt-1">0</h3>
                    </div>
                    <div class="glass p-6 rounded-xl border-l-4 border-rose-500">
                        <p class="text-slate-400 text-sm">Barang Keluar (Bulan Ini)</p>
                        <h3 id="stat-total-out" class="text-3xl font-bold mt-1">0</h3>
                    </div>
                </div>

                <div class="glass p-6 rounded-xl">
                    <canvas id="mainChart" height="100"></canvas>
                </div>
            </div>

            <!-- Input Tab -->
            <div id="tab-input" class="tab-content hidden space-y-6">
                <h2 class="text-2xl font-bold">Input Data Logistik</h2>
                <div class="glass p-6 rounded-xl max-w-4xl">
                    <div class="grid grid-cols-2 gap-4 mb-6">
                        <div>
                            <label class="block text-xs font-medium text-slate-400 mb-1">Tipe Transaksi</label>
                            <select id="input-type" class="w-full p-2">
                                <option value="IN">BARANG MASUK</option>
                                <option value="OUT">BARANG KELUAR</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-slate-400 mb-1">Tanggal</label>
                            <input type="date" id="input-date" class="w-full p-2">
                        </div>
                    </div>
                    <div class="space-y-4" id="input-rows">
                        <!-- Baris input barang dinamis -->
                    </div>
                    <button onclick="addInputRow()" class="mt-4 text-sm text-blue-400 hover:underline">+ Tambah Baris Barang</button>
                    <hr class="my-6 border-slate-700">
                    <button id="btn-save-tx" class="btn-primary px-8 py-3 rounded-lg font-bold">Simpan Transaksi</button>
                </div>
            </div>

            <!-- Inventory Tab -->
            <div id="tab-inventory" class="tab-content hidden space-y-6">
                <h2 class="text-2xl font-bold">Stok Inventaris</h2>
                <div class="glass rounded-xl overflow-hidden">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-slate-800/50 text-slate-400 uppercase text-[10px] tracking-widest">
                            <tr>
                                <th class="p-4">Nama Barang</th>
                                <th class="p-4 text-center">Masuk</th>
                                <th class="p-4 text-center">Keluar</th>
                                <th class="p-4 text-right">Sisa Stok</th>
                            </tr>
                        </thead>
                        <tbody id="inventory-table-body">
                            <!-- Data stok otomatis -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Firebase Scripts -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'hosp-logistics-v2';

        let isRegisterMode = false;
        let currentUser = null;

        // UI Helpers
        const showToast = (msg, type = 'success') => {
            const toast = document.createElement('div');
            toast.className = `fixed bottom-4 right-4 px-6 py-3 rounded-lg text-white z-[200] ${type === 'success' ? 'bg-emerald-600' : 'bg-red-600'} shadow-xl animate-bounce`;
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        };

        const toggleAuthMode = () => {
            isRegisterMode = !isRegisterMode;
            document.getElementById('auth-subtitle').innerText = isRegisterMode ? 'Buat akun pengelola baru' : 'Masuk untuk mengelola logistik';
            document.getElementById('btn-login').innerText = isRegisterMode ? 'Daftar Akun' : 'Masuk Sekarang';
            document.getElementById('btn-toggle-auth').innerText = isRegisterMode ? 'Sudah punya akun? Login' : 'Belum punya akun? Daftar';
        };

        document.getElementById('btn-toggle-auth').onclick = toggleAuthMode;

        // AUTH LOGIC
        document.getElementById('btn-login').onclick = async () => {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            const errDiv = document.getElementById('auth-error');

            if(!email || !pass) return;

            errDiv.classList.add('hidden');
            try {
                if(isRegisterMode) {
                    await createUserWithEmailAndPassword(auth, email, pass);
                    showToast("Akun berhasil dibuat!");
                } else {
                    await signInWithEmailAndPassword(auth, email, pass);
                    showToast("Login Berhasil!");
                }
            } catch (e) {
                errDiv.innerText = e.message.includes('auth/user-not-found') ? "User tidak ditemukan." : 
                                  e.message.includes('auth/wrong-password') ? "Password salah." : 
                                  e.message;
                errDiv.classList.remove('hidden');
            }
        };

        document.getElementById('btn-logout').onclick = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if(user) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');
                document.getElementById('user-display').innerText = user.email;
                loadData();
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('app-content').classList.add('hidden');
            }
        });

        // APP LOGIC
        window.switchTab = (tab) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.remove('hidden');
            event.currentTarget.classList.add('active');
        };

        window.addInputRow = () => {
            const id = Date.now();
            const div = document.createElement('div');
            div.className = "grid grid-cols-3 gap-4 animate-fade-in";
            div.id = `row-${id}`;
            div.innerHTML = `
                <input type="text" placeholder="Nama Barang" class="item-name p-2">
                <input type="number" placeholder="Jumlah" class="item-qty p-2">
                <button onclick="this.parentElement.remove()" class="text-red-500 text-left">Hapus</button>
            `;
            document.getElementById('input-rows').appendChild(div);
        };

        document.getElementById('btn-save-tx').onclick = async () => {
            if(!currentUser) return;
            const type = document.getElementById('input-type').value;
            const date = document.getElementById('input-date').value || new Date().toISOString().split('T')[0];
            const rows = document.getElementById('input-rows').children;

            if(rows.length === 0) return showToast("Tambahkan barang dulu!", "error");

            try {
                for(let row of rows) {
                    const name = row.querySelector('.item-name').value;
                    const qty = parseFloat(row.querySelector('.item-qty').value);
                    if(name && qty) {
                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'transactions'), {
                            type, name, qty, date,
                            timestamp: serverTimestamp(),
                            userId: currentUser.uid
                        });
                    }
                }
                document.getElementById('input-rows').innerHTML = "";
                showToast("Transaksi Berhasil Disimpan!");
                switchTab('dashboard');
            } catch (e) {
                showToast("Gagal menyimpan data", "error");
            }
        };

        let chart = null;
        function loadData() {
            if(!currentUser) return;
            
            const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'transactions'));
            onSnapshot(q, (snapshot) => {
                const data = snapshot.docs.map(d => d.data());
                updateStats(data);
                renderInventory(data);
                renderChart(data);
            }, (err) => console.error(err));
        }

        function updateStats(data) {
            const now = new Date();
            const thisMonth = now.getMonth();
            const thisYear = now.getFullYear();

            document.getElementById('stat-total-tx').innerText = data.length;
            
            const monthData = data.filter(d => {
                const dDate = new Date(d.date);
                return dDate.getMonth() === thisMonth && dDate.getFullYear() === thisYear;
            });

            const inTotal = monthData.filter(d => d.type === 'IN').reduce((a,b) => a + b.qty, 0);
            const outTotal = monthData.filter(d => d.type === 'OUT').reduce((a,b) => a + b.qty, 0);

            document.getElementById('stat-total-in').innerText = inTotal;
            document.getElementById('stat-total-out').innerText = outTotal;
        }

        function renderInventory(data) {
            const items = {};
            data.forEach(d => {
                if(!items[d.name]) items[d.name] = { in: 0, out: 0 };
                if(d.type === 'IN') items[d.name].in += d.qty;
                else items[d.name].out += d.qty;
            });

            const tbody = document.getElementById('inventory-table-body');
            tbody.innerHTML = Object.entries(items).map(([name, val]) => `
                <tr class="border-b border-slate-800/50 hover:bg-slate-800/20 transition-colors">
                    <td class="p-4 font-medium text-slate-200">${name}</td>
                    <td class="p-4 text-center text-emerald-400 font-mono">+${val.in}</td>
                    <td class="p-4 text-center text-rose-400 font-mono">-${val.out}</td>
                    <td class="p-4 text-right">
                        <span class="px-3 py-1 rounded-full ${val.in - val.out < 5 ? 'bg-red-500/10 text-red-400' : 'bg-blue-500/10 text-blue-400'} font-bold">
                            ${val.in - val.out}
                        </span>
                    </td>
                </tr>
            `).join('');
        }

        function renderChart(data) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if(chart) chart.destroy();

            // Group by date for last 7 days
            const labels = [...new Set(data.map(d => d.date))].sort().slice(-7);
            const inData = labels.map(l => data.filter(d => d.date === l && d.type === 'IN').reduce((a,b) => a+b.qty, 0));
            const outData = labels.map(l => data.filter(d => d.date === l && d.type === 'OUT').reduce((a,b) => a+b.qty, 0));

            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels,
                    datasets: [
                        { label: 'Barang Masuk', data: inData, borderColor: '#10b981', tension: 0.4, fill: true, backgroundColor: 'rgba(16, 185, 129, 0.1)' },
                        { label: 'Barang Keluar', data: outData, borderColor: '#f43f5e', tension: 0.4, fill: true, backgroundColor: 'rgba(244, 63, 94, 0.1)' }
                    ]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { grid: { color: '#1e293b' }, ticks: { color: '#64748b' } },
                        x: { grid: { display: false }, ticks: { color: '#64748b' } }
                    }
                }
            });
        }

        setInterval(() => {
            document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('id-ID') + " WIB";
        }, 1000);

        addInputRow();
    </script>
</body>
</html>
